<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Moteur de Recherche</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #202124; 
            color: #e8eaed; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            text-decoration: none;
            color: #8ab4f8; 
        }

        a:hover {
            text-decoration: underline;
        }

        /* VUE ACCUEIL */
        #home-view {
            display: flex;
            flex-direction: column;
            height: 100vh;
            justify-content: space-between;
        }

        #home-view header {
            display: flex;
            justify-content: flex-end;
            padding: 15px 30px;
            font-size: 13px;
        }

        header a {
            margin-left: 15px;
            color: #e8eaed;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            margin-bottom: 100px;
        }

        .logo {
            font-size: 80px; 
            font-weight: bold;
            letter-spacing: -2.5px;
            margin-bottom: 30px;
            user-select: none;
            color: #f1f3f4;
            cursor: pointer;
        }

        .search-box {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 584px;
            height: 46px;
            border: 1px solid #5f6368; 
            border-radius: 24px;
            padding: 0 15px;
            transition: background-color 0.2s, box-shadow 0.2s, border-color 0.2s;
        }

        .search-box:hover, .search-box:focus-within {
            background-color: #303134;
            box-shadow: 0 1px 6px rgba(23, 23, 23, 0.9);
            border-color: rgba(223, 225, 229, 0);
        }

        .search-icon {
            color: #9aa0a6;
            margin-right: 12px;
            display: flex;
            align-items: center;
        }

        .search-input {
            flex-grow: 1;
            border: none;
            outline: none;
            font-size: 16px;
            color: #e8eaed; 
            background: transparent;
        }

        .buttons-container {
            margin-top: 28px;
            display: flex;
            gap: 12px;
        }

        .btn {
            background-color: #303134; 
            border: 1px solid #303134;
            border-radius: 4px;
            color: #e8eaed;
            font-size: 14px;
            padding: 0 16px;
            height: 36px;
            text-align: center;
            cursor: pointer;
        }

        .btn:hover {
            border: 1px solid #5f6368;
        }

        footer {
            background: #171717;
            font-size: 14px;
            color: #9aa0a6;
            border-top: 1px solid #3c4043;
        }

        .footer-top {
            padding: 15px 30px;
            border-bottom: 1px solid #3c4043;
        }

        .footer-bottom {
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .footer-bottom div {
            display: flex;
            gap: 27px;
        }

        .footer-bottom a {
            color: #9aa0a6;
        }

        /* VUE RÉSULTATS */
        #results-view {
            display: none; 
            flex-direction: column;
            width: 100%;
        }

        .results-header {
            display: flex;
            align-items: center;
            padding: 20px 30px;
            border-bottom: 1px solid #3c4043;
            gap: 40px;
        }

        .logo-small {
            font-size: 24px;
            font-weight: bold;
            color: #f1f3f4;
            cursor: pointer;
            user-select: none;
        }

        .results-stats {
            padding: 15px 160px;
            font-size: 14px;
            color: #9aa0a6;
        }

        .results-container {
            padding: 0 160px;
            max-width: 730px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-bottom: 50px;
        }

        .result-item {
            display: flex;
            flex-direction: column;
        }

        .result-url {
            font-size: 12px;
            color: #bdc1c6;
            margin-bottom: 4px;
        }

        .result-title {
            font-size: 20px;
            color: #8ab4f8;
            margin-bottom: 8px;
            display: inline-block;
        }

        .result-snippet {
            font-size: 14px;
            color: #bdc1c6;
            line-height: 1.4;
        }

        @media (max-width: 800px) {
            .results-stats, .results-container {
                padding: 15px 20px;
            }
            .results-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
        }
    </style>
</head>
<body>

    <div id="home-view">
        <header>
            <a href="#">Mon Compte</a>
            <a href="#">Images</a>
        </header>

        <div class="main-container">
            <div class="logo" onclick="goHome()">Recherche</div>
            
            <form class="search-box" onsubmit="executeSearch(event, 'home-input')">
                <div class="search-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20">
                        <path fill="#9aa0a6" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path>
                    </svg>
                </div>
                <input type="text" id="home-input" class="search-input" autofocus autocomplete="off">
                <button type="submit" style="display: none;"></button>
            </form>

            <div class="buttons-container">
                <button class="btn" onclick="triggerHomeSearch()">Recherche</button>
                <button class="btn" type="button">J'ai de la chance</button>
            </div>
        </div>

        <footer>
            <div class="footer-top">France</div>
            <div class="footer-bottom">
                <div>
                    <a href="#">À propos</a>
                    <a href="#">Publicité</a>
                </div>
                <div>
                    <a href="#">Confidentialité</a>
                    <a href="#">Conditions</a>
                </div>
            </div>
        </footer>
    </div>

    <div id="results-view">
        <div class="results-header">
            <div class="logo-small" onclick="goHome()">Recherche</div>
            
            <form class="search-box" onsubmit="executeSearch(event, 'results-input')">
                <input type="text" id="results-input" class="search-input" autocomplete="off">
                <button type="submit" style="display: none;"></button>
            </form>
        </div>

        <div class="results-stats" id="search-stats"></div>

        <div class="results-container" id="results-list"></div>
    </div>

    <script>
        function executeSearch(event, inputId) {
            if (event) event.preventDefault(); 
            
            const textRecherche = document.getElementById(inputId).value.trim();
            if (textRecherche === "") return;

            document.getElementById('home-input').value = textRecherche;
            document.getElementById('results-input').value = textRecherche;

            document.getElementById('home-view').style.display = 'none';
            document.getElementById('results-view').style.display = 'flex';

            const extensions = ["fr", "org", "com", "net", "info"];
            const plateformes = ["wikipedia", "actus-web", "dictionnaire-langue", "videostube", "resocial", "forum-entraide", "blog-tech", "portail-savoir"];
            
            const structuresTitres = [
                "Guide complet sur " + textRecherche + " : tout savoir",
                "Pourquoi " + textRecherche + " change notre quotidien",
                "Définition, origines et étymologie de " + textRecherche,
                "Top 10 des meilleures astuces concernant " + textRecherche,
                "Discussion communautaire et avis autour de : " + textRecherche,
                "Tutoriel pas à pas : maîtriser " + textRecherche + " facilement"
            ];

            const structuresSnippets = [
                "Découvrez l'analyse approfondie concernant " + textRecherche + " sur notre portail dédié. Historique, évolutions majeures et ressources associées.",
                "Les dernières actus à la une. Les experts décryptent l'impact de " + textRecherche + " sur les nouvelles générations et partagent leurs rapports.",
                "Quelle est la signification réelle de " + textRecherche + " ? Retrouvez le sens complet, l'orthographe exacte et des exemples concrets d'usage.",
                "Regardez cette vidéo explicative ludique au sujet de " + textRecherche + " . Un résumé accessible à tous pour faire le tour de la question."
            ];

            let totalResultats = 100;
            let htmlContenu = "";

            for (let i = 1; i <= totalResultats; i++) {
                const platef = plateformes[i % plateformes.length];
                const ext = extensions[i % extensions.length];
                const titre = structuresTitres[i % structuresTitres.length];
                const snippet = structuresSnippets[i % structuresSnippets.length];
                
                htmlContenu += '<div class="result-item">' +
                    '<span class="result-url">https://www.' + platef + '.' + ext + ' › page › ' + textRecherche.toLowerCase() + '-' + i + '</span>' +
                    '<a href="#" class="result-title">' + i + '. ' + titre + '</a>' +
                    '<span class="result-snippet">' + snippet + '</span>' +
                '</div>';
            }

            const tempsAleatoire = (Math.random() * (0.6 - 0.2) + 0.2).toFixed(2);
            document.getElementById('search-stats').innerText = "Environ " + totalResultats + " résultats (" + tempsAleatoire + " secondes)";
            document.getElementById('results-list').innerHTML = htmlContenu;
            
            window.scrollTo(0, 0);
        }

        function triggerHomeSearch() {
            executeSearch(null, 'home-input');
        }

        function goHome() {
            document.getElementById('results-view').style.display = 'none';
            document.getElementById('home-view').style.display = 'flex';
            document.getElementById('home-input').value = "";
            document.getElementById('home-input').focus();
        }
    </script>

</body>
</html>
