<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Moteur de Recherche</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #202124; 
            color: #e8eaed; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            text-decoration: none;
            color: #8ab4f8; 
        }

        a:hover {
            text-decoration: underline;
        }

        /* ==========================================================================
           VUE ACCUEIL (HOME)
           ========================================================================== */
        #home-view {
            display: flex;
            flex-direction: column;
            height: 100vh;
            justify-content: space-between;
        }

        #home-view header {
            display: flex;
            justify-content: flex-end;
            padding: 15px 30px;
            font-size: 13px;
        }

        #home-view header a {
            margin-left: 15px;
            color: #e8eaed;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            margin-bottom: 100px;
        }

        .logo {
            font-size: 80px; 
            font-weight: bold;
            letter-spacing: -2.5px;
            margin-bottom: 30px;
            user-select: none;
            color: #f1f3f4;
            cursor: pointer;
        }

        .search-box {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 584px;
            height: 46px;
            border: 1px solid #5f6368; 
            border-radius: 24px;
            padding: 0 15px;
            transition: background-color 0.2s, box-shadow 0.2s, border-color 0.2s;
        }

        .search-box:hover, .search-box:focus-within {
            background-color: #303134;
            box-shadow: 0 1px 6px rgba(23, 23, 23, 0.9);
            border-color: rgba(223, 225, 229, 0);
        }

        .search-icon {
            color: #9aa0a6;
            margin-right: 12px;
            display: flex;
            align-items: center;
        }

        .search-input {
            flex-grow: 1;
            border: none;
            outline: none;
            font-size: 16px;
            color: #e8eaed; 
            background: transparent;
        }

        .buttons-container {
            margin-top: 28px;
            display: flex;
            gap: 12px;
        }

        .btn {
            background-color: #303134; 
            border: 1px solid #303134;
            border-radius: 4px;
            color: #e8eaed;
            font-size: 14px;
            padding: 0 16px;
            height: 36px;
            text-align: center;
            cursor: pointer;
            transition: border 0.1s;
        }

        .btn:hover {
            border: 1px solid #5f6368;
        }

        footer {
            background: #171717;
            font-size: 14px;
            color: #9aa0a6;
            border-top: 1px solid #3c4043;
        }

        .footer-top {
            padding: 15px 30px;
            border-bottom: 1px solid #3c4043;
        }

        .footer-bottom {
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .footer-bottom div {
            display: flex;
            gap: 27px;
        }

        .footer-bottom a {
            color: #9aa0a6;
        }

        /* ==========================================================================
           VUE RÉSULTATS (RESULTS)
           ========================================================================== */
        #results-view {
            display: none; 
            flex-direction: column;
            width: 100%;
        }

        .results-header {
            display: flex;
            align-items: center;
            padding: 20px 30px;
            border-bottom: 1px solid #3c4043;
            gap: 40px;
        }

        .logo-small {
            font-size: 24px;
            font-weight: bold;
            color: #f1f3f4;
            cursor: pointer;
            user-select: none;
        }

        .results-stats {
            padding: 15px 160px;
            font-size: 14px;
            color: #9aa0a6;
        }

        .results-container {
            padding: 0 160px;
            max-width: 730px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-bottom: 50px;
        }

        .result-item {
            display: flex;
            flex-direction: column;
        }

        .result-url {
            font-size: 12px;
            color: #bdc1c6;
            margin-bottom: 4px;
        }

        .result-title {
            font-size: 20px;
            color: #8ab4f8;
            margin-bottom: 8px;
            display: inline-block;
        }
